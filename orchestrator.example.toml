# =============================================================================
# orchestrator.example.toml — Pluggable steps (Phase 33) worked example
# =============================================================================
#
# This is a COMPLETE, annotated example showing how to inject your own steps
# into the workflow without editing any Python. To use it:
#
#   1. Copy the [[steps.*]] blocks below into your real orchestrator.toml
#      (at the project root — the same dir you run the CLI from).
#   2. Create the support files this example references (their contents are
#      shown inline in comments below each step).
#   3. Run a feature as usual. Your steps run at the seam you named.
#
# The spine never changes:
#   verify_clean_tree → plan → branch → impl → qa → commit → push → pr
#
# Seams (insertion points), in workflow order — all run BEFORE the commit
# line, so a step can never leave a half-shipped state on cancel:
#
#   before_plan    once   — before planning (good for pre-flight checks)
#   after_plan     once   — after the plan is approved, before branching
#   after_impl     EACH   — after every implementation attempt (code changed)
#   after_qa       EACH   — after every QA run (pass or fail)
#   before_commit  once   — last step before the spine commits
#
# after_impl / after_qa run once PER retry attempt (the code changes each
# attempt). before_plan / after_plan / before_commit run exactly once. Put
# costly llm_agent steps at before_commit so they run only on the final,
# passing code.
#
# Validation: the manifest is checked at the start of every run (before any
# LLM spend) — unknown seam, duplicate id, missing script, or unknown agent
# all fail loudly. The resolved manifest is snapshotted per run, so editing
# it while a run is paused refuses the resume rather than silently changing
# the graph. `id` is a step's resume identity — don't rename it mid-run.
# =============================================================================


# --- Standard config (unchanged by Phase 33; shown for a complete file) ------

max_retries = 3

[models]
planning       = "claude-sonnet-4-6"
implementation = "claude-sonnet-4-6"
qa             = "claude-sonnet-4-6"

[human_in_loop]
approve_plan = true


# =============================================================================
# Pluggable steps
# =============================================================================

# ---------------------------------------------------------------------------
# 1) script @ before_plan — a fast pre-flight gate.
#    Runs once, before planning. A non-zero exit aborts the run immediately,
#    so you never pay for a plan when the repo isn't in a fit state.
#
#    Create .orchestrator/scripts/preflight.sh (chmod +x):
#
#      #!/bin/sh
#      # Refuse to start if there are merge-conflict markers lying around.
#      if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- ':!orchestrator.toml'; then
#        echo "merge-conflict markers present; resolve before running"
#        exit 1
#      fi
#      exit 0
# ---------------------------------------------------------------------------
[[steps.before_plan]]
id      = "preflight"
type    = "script"
path    = ".orchestrator/scripts/preflight.sh"
timeout = 30


# ---------------------------------------------------------------------------
# 2) script @ after_impl — run the test suite on EVERY attempt.
#    Because this is at after_impl, it fires after each implementation try,
#    against that attempt's freshly changed code. A non-zero exit aborts the
#    run (use it as a hard gate the agent's work must pass).
#
#    Create .orchestrator/scripts/run-tests.sh (chmod +x):
#
#      #!/bin/sh
#      node --test calc.test.js
# ---------------------------------------------------------------------------
[[steps.after_impl]]
id      = "unit-tests"
type    = "script"
path    = ".orchestrator/scripts/run-tests.sh"
timeout = 300


# ---------------------------------------------------------------------------
# 3) llm_agent @ before_commit — generate a changelog entry, ONCE.
#    llm_agent steps run a markdown-defined agent. Place costly LLM steps at
#    before_commit so they run a single time on the final, passing code (not
#    once per retry attempt). The agent is given the plan and runs `git diff`
#    itself; it edits files in the working tree, which the spine then commits.
#
#    Create .orchestrator/agents/changelog.md:
#
#      ---
#      name: changelog
#      model: claude-sonnet-4-6
#      ---
#      You maintain CHANGELOG.md for this project. Read CLAUDE.md, run
#      `git diff HEAD` to see what changed, and add a single concise entry
#      under an "Unreleased" heading describing the change in user terms.
#      Edit only CHANGELOG.md. When done, call emit_step_result with a
#      one-line summary.
# ---------------------------------------------------------------------------
[[steps.before_commit]]
id    = "changelog"
type  = "llm_agent"
agent = "changelog"                 # → .orchestrator/agents/changelog.md
model = "claude-sonnet-4-6"


# ---------------------------------------------------------------------------
# 4) human_gate @ before_commit — a final human sign-off.
#    Pauses the workflow (like the plan-approval pause). Resume it — via
#    approve_plan(thread_id, "yes") over MCP, or by replying at the CLI
#    prompt — to proceed to commit. It's an acknowledgement gate: any resume
#    value continues; it exists to make a human look before code ships.
#
#    Steps at the same seam run in declared order, so this fires AFTER the
#    changelog step above.
# ---------------------------------------------------------------------------
[[steps.before_commit]]
id   = "final-signoff"
type = "human_gate"
ask  = "Tests passed and changelog written. Approve commit + PR?"
